name: Testes

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências mínimas
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy pytest

      - name: Rodar suíte de regressão
        run: pytest -q
